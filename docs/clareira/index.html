<!doctype html>
<!-- Entrada do cliente 2D (V1): shell do Vite — mapa, painéis e HUD nascem de site/src/*.ts. -->
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#100c15" />
    <meta
      name="description"
      content="O Coração — o primeiro mundo de NÓS, um metaverso coletivo 2D que vive inteiramente dentro do GitHub."
    />
    <title>O Coração · NÓS</title>
    <script type="module" crossorigin src="./assets/index-DyHT3wCT.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-C6pbxzJj.css">
  </head>
  <body>
    <div id="app">
      <canvas id="map" aria-label="Mapa de O Coração"></canvas>

      <div id="hud">
        <div class="hud-top-group">
          <div class="hud-visiting" id="hud-visiting" hidden aria-live="polite"></div>

          <div class="hud-top">
            <div class="hud-panel">
              <h1 class="hud-title" id="hud-world-name">O Coração</h1>
              <dl class="hud-stats">
                <div class="hud-stat">
                  <dt>Batida</dt>
                  <dd><span class="pulse-dot" aria-hidden="true"></span><span id="stat-tick">—</span></dd>
                </div>
                <div class="hud-stat">
                  <dt>Jogadores</dt>
                  <dd id="stat-players">—</dd>
                </div>
              </dl>
              <p class="live-indicator" id="hud-live">
                <span class="live-dot" id="hud-live-dot" aria-hidden="true"></span><span id="hud-live-label">—</span>
              </p>
            </div>
            <div class="hud-brand" aria-hidden="true">NÓS</div>
          </div>

          <section class="hud-auth" id="hud-auth" aria-label="Entrar com GitHub"></section>

          <section class="hud-p2p" id="hud-p2p" aria-label="Modo tempo real (P2P) — ver outros jogadores ao vivo"></section>

          <section class="hud-meuno" id="hud-meuno" aria-label="Meu Nó — Pulso, energia e mochila"></section>

          <section class="hud-mural" id="hud-mural" aria-label="Mural do mundo — últimas falas, trocas e respostas">
            <h2 class="hud-mural-title">Mural</h2>
            <ol class="hud-mural-list" id="hud-mural-list"></ol>
          </section>

          <details class="hud-comercio" id="hud-comercio">
            <summary class="hud-comercio-summary">Comércio</summary>
            <div id="hud-comercio-body"></div>
          </details>

          <details class="hud-nativos" id="hud-nativos">
            <summary class="hud-nativos-summary">Nativos</summary>
            <div id="hud-nativos-body"></div>
          </details>

          <details class="hud-oficinas" id="hud-oficinas">
            <summary class="hud-oficinas-summary">Oficinas</summary>
            <div id="hud-oficinas-body"></div>
          </details>

          <details class="hud-portais" id="hud-portais">
            <summary class="hud-portais-summary">Portais</summary>
            <div id="hud-portais-body"></div>
          </details>
        </div>

        <p class="hud-hint">
          Arraste para explorar · roda ou pinça para aproximar ·
          <a class="hud-fps-link" href="fps/">jogar em primeira pessoa ▶</a>
        </p>
      </div>

      <div id="status" class="status" role="status" hidden></div>
    </div>
  </body>
</html>
