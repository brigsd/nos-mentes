<!doctype html>
<!-- protótipo GPU (D-54): renderizador WebGL 320×180 com upscale — publicado em /fps/gpu.html pra sentir a perf no celular. -->
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>NÓS · protótipo GPU (D-54)</title>
<style>
  html, body { margin: 0; height: 100%; background: #10141c; overflow: hidden; }
  /* a tela é preenchida pelo canvas; o buffer interno é 320x180 e a GPU
     faz o upscale NÍTIDO (pixel art preservado, custo constante) */
  #c { display: block; width: 100vw; height: 100vh; image-rendering: pixelated; image-rendering: crisp-edges; }
  #hud { position: fixed; top: 8px; left: 10px; font: 12px/1.4 ui-monospace, Menlo, monospace; color: #cddf6c; text-shadow: 0 1px 2px #000; pointer-events: none; }
  #hud b { color: #fbff86; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">NÓS · GPU (WebGL) — a MESMA casa do D-53, na placa<br><b id="fps">— fps</b> · render fixo 320×180 · upscale nítido pela GPU<br><span id="dev">—</span></div>
<script>
/* ============================================================================
   NÓS — protótipo GPU (D-54). Prova de conceito: a casa do D-53 renderizada
   por GEOMETRIA no WebGL. Paredes/telhado/empena = quads (as paredes-segmento
   JÁ eram quads); chão = plano; tudo desenhado num framebuffer 320×180 e o
   upscale é da GPU (nítido, custo independente da tela — o que conserta o
   "roda terrível no celular"). Z-buffer por-pixel = oclusão correta de graça.
   Pixel art mantido: texturas procedurais + filtragem NEAREST em tudo.
   ========================================================================== */

const PALETTE = ["#2e222f","#3e3546","#625565","#966c6c","#ab947a","#694f62","#7f708a","#9babb2","#c7dcd0","#ffffff","#6e2727","#b33831","#ea4f36","#f57d4a","#ae2334","#e83b3b","#fb6b1d","#f79617","#f9c22b","#7a3045","#9e4539","#cd683d","#e6904e","#fbb954","#4c3e24","#676633","#a2a947","#d5e04b","#fbff86","#165a4c","#239063","#1ebc73","#91db69","#cddf6c","#313638","#374e4a","#547e64","#92a984","#b2ba90","#0b5e65","#0b8a8f","#0eaf9b","#30e1b9","#8ff8e2","#323353","#484a77","#4d65b4","#4d9be6","#8fd3ff","#45293f","#6b3e75","#905ea9","#a884f3","#eaaded","#753c54","#a24b6f","#cf657f","#ed8099","#831c5d","#c32454","#f04f78","#f68181","#fca790","#fdcbb0"];
const RGB = PALETTE.map(h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]);

/* ---------- ruído de valor (mesma linguagem do cliente) ---------- */
function hash2(x, y) { let h = (x * 374761393 + y * 668265263) >>> 0; h = (h ^ (h >> 13)) * 1274126177; return ((h ^ (h >> 16)) >>> 0) / 4294967295; }
function vnoise(x, y) {
  const xi = Math.floor(x), yi = Math.floor(y), xf = x - xi, yf = y - yi;
  const u = xf * xf * (3 - 2 * xf), v = yf * yf * (3 - 2 * yf);
  const a = hash2(xi, yi), b = hash2(xi + 1, yi), c = hash2(xi, yi + 1), d = hash2(xi + 1, yi + 1);
  return a * (1 - u) * (1 - v) + b * u * (1 - v) + c * (1 - u) * v + d * u * v;
}

/* ---------- geradores de textura pixel-art -> <canvas> -> GL ---------- */
function texCanvas(W, H, fn) {
  const cv = document.createElement('canvas'); cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d'); const img = ctx.createImageData(W, H); const d = img.data;
  for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
    const idx = fn(x, y); const o = (y * W + x) * 4;
    if (idx < 0) { d[o + 3] = 0; continue; }
    const [r, g, b] = RGB[idx]; d[o] = r; d[o + 1] = g; d[o + 2] = b; d[o + 3] = 255;
  }
  ctx.putImageData(img, 0, 0); return cv;
}
/* parede: soco de pedra + reboco quente + prumos de meia-madeira + janelinha.
   16×32 = potência de dois nos DOIS lados (WebGL1 exige POT p/ wrap REPEAT;
   uma textura NPOT com REPEAT vira "incompleta" e amostra PRETO). */
const WALL_TEX = texCanvas(16, 32, (x, y) => {
  const n = vnoise(x * 0.8 + 3, y * 0.55 + 6);
  let i = n > 0.72 ? 8 : n < 0.24 ? 5 : 4;                 // reboco
  if (y > 22) { const c = (y / 4) | 0, off = (c & 1) * 4; i = (y % 4 === 0 || (x + off) % 8 === 0) ? 2 : (vnoise(x * 0.7, y * 0.6) > 0.6 ? 7 : 6); } // soco
  if (x === 0 || x === 15 || y === 0 || y === 8 || y === 22) i = 24; // prumos/travessas
  if (y >= 12 && y < 20 && x >= 5 && x < 11) { const b = x === 5 || x === 10 || y === 12 || y === 19 || x === 7 || x === 9 || y === 15; i = b ? 24 : (x + y) % 3 === 0 ? 23 : 18; } // janela acesa
  return i;
});
/* empena: reboco + travamento de madeira em X */
const GABLE_TEX = texCanvas(16, 16, (x, y) => {
  const n = vnoise(x * 0.9 + 9, y * 0.7 + 2);
  let i = n > 0.7 ? 8 : n < 0.26 ? 5 : 4;
  const fx = x / 15, fy = y / 15;
  if (Math.abs(fx - fy) < 0.09 || Math.abs(fx - (1 - fy)) < 0.09) i = 24;
  if (x === 0 || x === 15 || y === 0 || y === 15) i = 24;
  return i;
});
/* telha de terracota, fiadas sutis */
const ROOF_TEX = texCanvas(16, 16, (x, y) => {
  const course = (y / 3) | 0; let i = (course & 1) ? 20 : 21;
  if (y % 3 === 0) i = 20; if (vnoise(x * 1.3, y * 1.3) > 0.8) i = 14;
  return i;
});
/* grama: mosqueado de verdes */
const GRASS_TEX = texCanvas(16, 16, (x, y) => {
  const n = vnoise(x * 0.9 + 1, y * 0.9 + 1); return n > 0.7 ? 33 : n > 0.45 ? 32 : n > 0.2 ? 31 : 30;
});
/* assoalho de tábuas quentes */
const FLOOR_TEX = texCanvas(16, 16, (x, y) => {
  const board = (y / 4) | 0; const n = vnoise(x * 2.2 + board * 5, board * 1.7);
  let i = n > 0.64 ? 22 : n < 0.32 ? 20 : 21; if (y % 4 === 0) i = 24; return i;
});

/* ---------- mat4 mínimo ---------- */
const m4 = {
  persp(fovy, asp, n, f) { const t = 1 / Math.tan(fovy / 2), nf = 1 / (n - f);
    return [t / asp,0,0,0, 0,t,0,0, 0,0,(f + n) * nf,-1, 0,0,2 * f * n * nf,0]; },
  mul(a, b) { const o = new Array(16);
    for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) o[c * 4 + r] = a[r] * b[c * 4] + a[4 + r] * b[c * 4 + 1] + a[8 + r] * b[c * 4 + 2] + a[12 + r] * b[c * 4 + 3];
    return o; },
  lookAt(e, ct, up) {
    let zx = e[0] - ct[0], zy = e[1] - ct[1], zz = e[2] - ct[2]; let l = Math.hypot(zx, zy, zz); zx /= l; zy /= l; zz /= l;
    let xx = up[1] * zz - up[2] * zy, xy = up[2] * zx - up[0] * zz, xz = up[0] * zy - up[1] * zx; l = Math.hypot(xx, xy, xz) || 1; xx /= l; xy /= l; xz /= l;
    const yx = zy * xz - zz * xy, yy = zz * xx - zx * xz, yz = zx * xy - zy * xx;
    return [xx,yx,zx,0, xy,yy,zy,0, xz,yz,zz,0, -(xx * e[0] + xy * e[1] + xz * e[2]), -(yx * e[0] + yy * e[1] + yz * e[2]), -(zx * e[0] + zy * e[1] + zz * e[2]), 1]; },
};

/* ---------- geometria: acumula (pos xyz, uv, normal) por textura ---------- */
function Mesh() { return { v: [] }; }
function quad(m, p0, p1, p2, p3, uS, vS, nrm) {
  const push = (p, u, v) => m.v.push(p[0], p[1], p[2], u, v, nrm[0], nrm[1], nrm[2]);
  push(p0, 0, vS); push(p1, uS, vS); push(p2, uS, 0);
  push(p0, 0, vS); push(p2, uS, 0); push(p3, 0, 0);
}
function tri(m, p0, p1, p2, uv0, uv1, uv2, nrm) {
  const push = (p, uv) => m.v.push(p[0], p[1], p[2], uv[0], uv[1], nrm[0], nrm[1], nrm[2]);
  push(p0, uv0); push(p1, uv1); push(p2, uv2);
}

/* A CASA (mesma do D-53): pegada 3×3, cume ao longo de Z, empenas em ±Z (N/S),
   águas caindo pra ±X (E/O), porta na empena sul. Unidades em "tiles". */
const HW = 1.5, WALLH = 1.1, RIDGE = 1.85, DOORW = 0.5, DOORH = 0.8, OV = 0.22;
const walls = Mesh(), gables = Mesh(), roof = Mesh(), floor = Mesh(), planks = Mesh();

// chão de grama (grande) e assoalho interno
quad(floor, [-16,0,16], [16,0,16], [16,0,-16], [-16,0,-16], 32, 32, [0,1,0]);
quad(planks, [-HW,0.01,HW], [HW,0.01,HW], [HW,0.01,-HW], [-HW,0.01,-HW], 3, 3, [0,1,0]);

// paredes E/O (laterais do beiral) — x = ±HW, ao longo de Z
quad(walls, [HW,0,HW], [HW,0,-HW], [HW,WALLH,-HW], [HW,WALLH,HW], 3, 1, [1,0,0]);   // E
quad(walls, [-HW,0,-HW], [-HW,0,HW], [-HW,WALLH,HW], [-HW,WALLH,-HW], 3, 1, [-1,0,0]); // O
// parede N (fundo, empena cheia) — z = -HW
quad(walls, [-HW,0,-HW], [HW,0,-HW], [HW,WALLH,-HW], [-HW,WALLH,-HW], 3, 1, [0,0,-1]);
tri(gables, [-HW,WALLH,-HW], [HW,WALLH,-HW], [0,RIDGE,-HW], [0,0], [1.6,0], [0.8,1], [0,0,-1]);
// parede S (frente, empena com PORTA) — z = +HW
quad(walls, [-HW,0,HW], [-DOORW,0,HW], [-DOORW,WALLH,HW], [-HW,WALLH,HW], 1, 1, [0,0,1]); // jamba esq
quad(walls, [DOORW,0,HW], [HW,0,HW], [HW,WALLH,HW], [DOORW,WALLH,HW], 1, 1, [0,0,1]);      // jamba dir
quad(gables, [-DOORW,DOORH,HW], [DOORW,DOORH,HW], [DOORW,WALLH,HW], [-DOORW,WALLH,HW], 1,0.3, [0,0,1]); // verga (reboco)
tri(gables, [-HW,WALLH,HW], [HW,WALLH,HW], [0,RIDGE,HW], [0,0], [1.6,0], [0.8,1], [0,0,1]);
// dentro da porta: parede de fundo (reboco) pra dar profundidade ao vão
quad(gables, [-DOORW,0,-HW+0.02], [DOORW,0,-HW+0.02], [DOORW,DOORH,-HW+0.02], [-DOORW,DOORH,-HW+0.02], 1,1, [0,0,1]);

// telhado: duas águas (E/O) com beiral saliente; cume ao longo de Z em x=0
const EZ = HW + OV, EX = HW + OV;
quad(roof, [0,RIDGE,-EZ], [0,RIDGE,EZ], [-EX,WALLH,EZ], [-EX,WALLH,-EZ], 3.4, 1.6, [-0.7,0.7,0]); // água O
quad(roof, [0,RIDGE,EZ], [0,RIDGE,-EZ], [EX,WALLH,-EZ], [EX,WALLH,EZ], 3.4, 1.6, [0.7,0.7,0]);   // água L

/* ---------- WebGL ---------- */
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl', { antialias: false, depth: true });
const dev = document.getElementById('dev');
if (!gl) { dev.textContent = 'WebGL indisponível neste aparelho.'; throw new Error('no webgl'); }
dev.textContent = (gl.getParameter(gl.VERSION) || '') + ' · ' + (gl.getParameter(gl.RENDERER) || '');

function sh(type, src) { const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s)); return s; }
function prog(vs, fs) { const p = gl.createProgram(); gl.attachShader(p, sh(gl.VERTEX_SHADER, vs)); gl.attachShader(p, sh(gl.FRAGMENT_SHADER, fs)); gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p)); return p; }

const SKY = [0.78, 0.86, 0.82];
const scene = prog(`
  attribute vec3 aPos; attribute vec2 aUV; attribute vec3 aNrm;
  uniform mat4 uMVP; uniform vec3 uCam;
  varying vec2 vUV; varying float vFog; varying float vSh;
  void main(){
    gl_Position = uMVP * vec4(aPos, 1.0);
    vUV = aUV;
    float d = distance(aPos, uCam);
    vFog = clamp(1.0 - (d - 4.0) / 22.0, 0.35, 1.0);
    vec3 L = normalize(vec3(0.35, 0.9, 0.25));
    vSh = 0.72 + 0.28 * max(0.0, dot(normalize(aNrm), L));
  }`, `
  precision mediump float;
  varying vec2 vUV; varying float vFog; varying float vSh;
  uniform sampler2D uTex; uniform vec3 uSky;
  void main(){
    vec4 c = texture2D(uTex, vUV);
    if (c.a < 0.5) discard;
    vec3 col = mix(uSky, c.rgb * vSh, vFog);
    gl_FragColor = vec4(col, 1.0);
  }`);
const blit = prog(`
  attribute vec2 aPos; varying vec2 vUV;
  void main(){ vUV = aPos * 0.5 + 0.5; gl_Position = vec4(aPos, 0.0, 1.0); }`, `
  precision mediump float; varying vec2 vUV; uniform sampler2D uTex;
  void main(){ gl_FragColor = texture2D(uTex, vUV); }`);

const A = { pos: gl.getAttribLocation(scene, 'aPos'), uv: gl.getAttribLocation(scene, 'aUV'), nrm: gl.getAttribLocation(scene, 'aNrm') };
const U = { mvp: gl.getUniformLocation(scene, 'uMVP'), cam: gl.getUniformLocation(scene, 'uCam'), tex: gl.getUniformLocation(scene, 'uTex'), sky: gl.getUniformLocation(scene, 'uSky') };
const BA = gl.getAttribLocation(blit, 'aPos'), BT = gl.getUniformLocation(blit, 'uTex');

function glTex(cv) { const t = gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D, t);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, cv);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT); gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST); gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
  return t; }
function glMesh(m) { const b = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, b); gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(m.v), gl.STATIC_DRAW); return { buf: b, n: m.v.length / 8 }; }

const BATCHES = [
  { mesh: glMesh(floor), tex: glTex(GRASS_TEX) },
  { mesh: glMesh(planks), tex: glTex(FLOOR_TEX) },
  { mesh: glMesh(walls), tex: glTex(WALL_TEX) },
  { mesh: glMesh(gables), tex: glTex(GABLE_TEX) },
  { mesh: glMesh(roof), tex: glTex(ROOF_TEX) },
];

/* framebuffer INTERNO — todo o render acontece aqui; a GPU faz o upscale
   nítido. Custo = função DESTE tamanho, NÃO da tela. ?res=<largura> (320
   padrão = pixel art; 640/960 = mais nítido) — na GPU o custo mal muda. */
const IW = Math.max(160, (parseInt(new URLSearchParams(location.search).get('res')) || 320)) | 0;
const IH = Math.round(IW * 9 / 16);
dev.textContent = `${IW}×${IH} interno · ` + dev.textContent;
const fbTex = gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D, fbTex);
gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, IW, IH, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST); gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE); gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
const depthRB = gl.createRenderbuffer(); gl.bindRenderbuffer(gl.RENDERBUFFER, depthRB);
gl.renderbufferStorage(gl.RENDERBUFFER, gl.DEPTH_COMPONENT16, IW, IH);
const fbo = gl.createFramebuffer(); gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, fbTex, 0);
gl.framebufferRenderbuffer(gl.FRAMEBUFFER, gl.DEPTH_ATTACHMENT, gl.RENDERBUFFER, depthRB);

const quadVBO = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, quadVBO);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

/* câmera: órbita lenta; ?a=<graus>&e=<altura> fixa (p/ screenshot) */
const params = new URLSearchParams(location.search);
const fixedA = params.has('a') ? parseFloat(params.get('a')) * Math.PI / 180 : null;
const eye = params.has('e') ? parseFloat(params.get('e')) : 1.15;
const rad = params.has('r') ? parseFloat(params.get('r')) : 5.2;

function resize() { const dpr = Math.min(devicePixelRatio || 1, 2); canvas.width = innerWidth * dpr | 0; canvas.height = innerHeight * dpr | 0; }
addEventListener('resize', resize); resize();

let t0 = performance.now(), frames = 0, fpsEl = document.getElementById('fps');
function frame(now) {
  const ang = fixedA !== null ? fixedA : (now / 4200);
  const ex = Math.sin(ang) * rad, ez = Math.cos(ang) * rad;
  const view = m4.lookAt([ex, eye, ez], [0, 0.6, 0], [0, 1, 0]);
  const proj = m4.persp(60 * Math.PI / 180, IW / IH, 0.05, 60);
  const mvp = m4.mul(proj, view);

  // --- passo 1: cena -> framebuffer 320×180 ---
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo); gl.viewport(0, 0, IW, IH);
  gl.enable(gl.DEPTH_TEST); gl.clearColor(SKY[0], SKY[1], SKY[2], 1);
  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
  gl.useProgram(scene); gl.uniformMatrix4fv(U.mvp, false, new Float32Array(mvp));
  gl.uniform3f(U.cam, ex, eye, ez); gl.uniform3fv(U.sky, SKY); gl.uniform1i(U.tex, 0);
  gl.activeTexture(gl.TEXTURE0);
  for (const B of BATCHES) {
    gl.bindTexture(gl.TEXTURE_2D, B.tex); gl.bindBuffer(gl.ARRAY_BUFFER, B.mesh.buf);
    gl.enableVertexAttribArray(A.pos); gl.vertexAttribPointer(A.pos, 3, gl.FLOAT, false, 32, 0);
    gl.enableVertexAttribArray(A.uv); gl.vertexAttribPointer(A.uv, 2, gl.FLOAT, false, 32, 12);
    gl.enableVertexAttribArray(A.nrm); gl.vertexAttribPointer(A.nrm, 3, gl.FLOAT, false, 32, 20);
    gl.drawArrays(gl.TRIANGLES, 0, B.mesh.n);
  }
  // --- passo 2: framebuffer -> tela, upscale NEAREST (nítido, de graça) ---
  gl.bindFramebuffer(gl.FRAMEBUFFER, null); gl.viewport(0, 0, canvas.width, canvas.height);
  gl.disable(gl.DEPTH_TEST); gl.useProgram(blit);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, fbTex); gl.uniform1i(BT, 0);
  gl.bindBuffer(gl.ARRAY_BUFFER, quadVBO); gl.enableVertexAttribArray(BA); gl.vertexAttribPointer(BA, 2, gl.FLOAT, false, 0, 0);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  frames++; if (now - t0 >= 500) { fpsEl.textContent = Math.round(frames * 1000 / (now - t0)) + ' fps'; frames = 0; t0 = now; }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
window.__ready = true;
</script>
</body>
</html>
